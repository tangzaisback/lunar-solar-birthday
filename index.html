<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>달과 절기로 보는 내 생일</title>
  <meta property="og:title" content="달과 절기로 보는 내 생일" />
  <meta property="og:description" content="옛날 사람들은 생일을 어떻게 알 수 있었을까요? 태어난 날의 절기와 달의 모양을 알아보세요" />
  <meta name="twitter:title" content="달과 절기로 보는 내 생일" />
  <meta name="twitter:description" content="옛날 사람들은 생일을 어떻게 알 수 있었을까요? 태어난 날의 절기와 달의 모양을 알아보세요" />
  <meta name="twitter:image" content="이미지 URL" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── INPUT SCREEN ───────────────────────── -->
  <div id="input-screen" class="screen">
    <p class="input-eyebrow" style="margin-bottom: 0.25rem">달력이 없던 시절을 상상하며</p>
    <p class="input-eyebrow">절기와 달의 모양으로 알아보는 나의 생일</p>

    <h1 class="input-question" style="margin-bottom: 0.75em">언제 태어났나요?</h1>

    <div class="input-wrap">
      <input
        id="birthdate"
        class="date-input"
        type="date"
        min="1900-01-31"
        max="2050-11-18"
      />
      <p class="input-hint">양력으로 입력해주세요</p>
    </div>

    <button class="cta-btn" id="convertBtn">알아보기</button>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <!-- ── RESULT SCREEN ──────────────────────── -->
  <div id="result-screen" class="screen screen--hidden">
    <div id="moonIcon" class="moon-icon"></div>
    <p id="resultMain" class="result-main"></p>
    <div class="result-rule"></div>
    <div id="resultMeta" class="result-meta"></div>
    <div id="solar-term-wheel"></div>
    <p id="result-season"></p>
    <button id="resetBtn" class="reset-btn cta-btn">돌아가기</button>
  </div>

  <script src="https://unpkg.com/korean-lunar-calendar@0.3.6/dist/korean-lunar-calendar.min.js"></script>
  <script>
    /* ------------------------------------------------------------------ */
    /* Data                                                                 */
    /* ------------------------------------------------------------------ */

    const SOLAR_TERMS = [
      { name: '소한', month: 1,  baseDay: 6  },
      { name: '대한', month: 1,  baseDay: 20 },
      { name: '입춘', month: 2,  baseDay: 4  },
      { name: '우수', month: 2,  baseDay: 19 },
      { name: '경칩', month: 3,  baseDay: 6  },
      { name: '춘분', month: 3,  baseDay: 21 },
      { name: '청명', month: 4,  baseDay: 5  },
      { name: '곡우', month: 4,  baseDay: 20 },
      { name: '입하', month: 5,  baseDay: 6  },
      { name: '소만', month: 5,  baseDay: 21 },
      { name: '망종', month: 6,  baseDay: 6  },
      { name: '하지', month: 6,  baseDay: 21 },
      { name: '소서', month: 7,  baseDay: 7  },
      { name: '대서', month: 7,  baseDay: 23 },
      { name: '입추', month: 8,  baseDay: 7  },
      { name: '처서', month: 8,  baseDay: 23 },
      { name: '백로', month: 9,  baseDay: 8  },
      { name: '추분', month: 9,  baseDay: 23 },
      { name: '한로', month: 10, baseDay: 8  },
      { name: '상강', month: 10, baseDay: 23 },
      { name: '입동', month: 11, baseDay: 7  },
      { name: '소설', month: 11, baseDay: 22 },
      { name: '대설', month: 12, baseDay: 7  },
      { name: '동지', month: 12, baseDay: 22 },
    ];

    const SOLAR_TERM_WORDING = {
      '소한': '겨울 추위가 깊어지는 소한',
      '대한': '한 해의 가장 추운 날, 대한',
      '입춘': '봄이 시작되는 입춘',
      '우수': '눈이 녹아 비가 내리는 우수',
      '경칩': '땅속 벌레가 깨어나는 경칩',
      '춘분': '낮과 밤이 같아지는 춘분',
      '청명': '하늘이 맑고 밝아지는 청명',
      '곡우': '봄비가 내려 씨앗을 적시는 곡우',
      '입하': '여름이 시작되는 입하',
      '소만': '만물이 가득 차오르는 소만',
      '망종': '씨앗을 뿌리는 망종',
      '하지': '낮이 가장 긴 하지',
      '소서': '여름 더위가 시작되는 소서',
      '대서': '한 해의 가장 더운 날, 대서',
      '입추': '가을이 시작되는 입추',
      '처서': '더위가 물러가는 처서',
      '백로': '이슬이 맺히기 시작하는 백로',
      '추분': '낮과 밤이 같아지는 추분',
      '한로': '찬 이슬이 내리는 한로',
      '상강': '서리가 내리기 시작하는 상강',
      '입동': '겨울이 시작되는 입동',
      '소설': '첫눈이 내리는 소설',
      '대설': '눈이 가장 많이 내리는 대설',
      '동지': '밤이 가장 긴 동지',
    };

    /* 동지를 12시(top)에 놓고 시계방향으로 24절기 배열 */
    const WHEEL_ORDER = [
      '동지','소한','대한',
      '입춘','우수','경칩','춘분','청명','곡우',
      '입하','소만','망종','하지','소서','대서',
      '입추','처서','백로','추분','한로','상강',
      '입동','소설','대설',
    ];

    /* ------------------------------------------------------------------ */
    /* Logic                                                                */
    /* ------------------------------------------------------------------ */

    function getMoonPhaseWording(lunarDay) {
      if (lunarDay === 1)  return '달이 숨은 날';
      if (lunarDay <= 6)   return '달이 막 피어나던 날';
      if (lunarDay <= 8)   return '달이 반쯤 찬 날';
      if (lunarDay <= 14)  return '달이 막 차오르던 날';
      if (lunarDay === 15) return '보름달이 뜬 날';
      if (lunarDay <= 21)  return '달이 기울기 시작한 날';
      if (lunarDay <= 23)  return '달이 반쯤 기운 날';
      return '달이 저물던 날';
    }

    function getLastSolarTerm(year, month, day) {
      const inputDate = new Date(year, month - 1, day);
      const candidates = [];
      for (const y of [year - 1, year]) {
        for (const term of SOLAR_TERMS) {
          candidates.push({
            name: term.name,
            date: new Date(y, term.month - 1, term.baseDay),
            year: y,
            month: term.month,
            day: term.baseDay,
          });
        }
      }
      candidates.sort((a, b) => b.date - a.date);
      return candidates.find(c => c.date <= inputDate) || null;
    }

    function getNextSolarTerm(year, month, day) {
      const inputDate = new Date(year, month - 1, day);
      const candidates = [];
      for (const y of [year, year + 1]) {
        for (const term of SOLAR_TERMS) {
          candidates.push({
            name: term.name,
            date: new Date(y, term.month - 1, term.baseDay),
            year: y,
            month: term.month,
            day: term.baseDay,
          });
        }
      }
      candidates.sort((a, b) => a.date - b.date);
      return candidates.find(c => c.date > inputDate) || null;
    }

    function getSeason(termName) {
      if (['입춘','우수','경칩','춘분','청명','곡우'].includes(termName))
        return { label: '봄', color: '#8ab5a0' };
      if (['입하','소만','망종','하지','소서','대서'].includes(termName))
        return { label: '여름', color: '#c9a96e' };
      if (['입추','처서','백로','추분','한로','상강'].includes(termName))
        return { label: '가을', color: '#c48b5a' };
      if (['입동','소설','대설','동지','소한','대한'].includes(termName))
        return { label: '겨울', color: '#7a9ec9' };
      return null;
    }

    function josa(word) {
      const code = word.charCodeAt(word.length - 1);
      if (code >= 0xAC00 && code <= 0xD7A3) {
        return (code - 0xAC00) % 28 > 0 ? '과' : '와';
      }
      return '과';
    }

    function getLunarDate(year, month, day) {
      const cal = new KoreanLunarCalendar();
      cal.setSolarDate(year, month, day);
      return cal.getLunarCalendar();
    }

    function formatSolarDate(year, month, day) {
      return `양력 · ${year}년 ${month}월 ${day}일`;
    }

    function formatLunarDate(lunar) {
      const leapMark = lunar.isLeapMonth ? ' (윤달)' : '';
      return `음력 · ${lunar.year}년 ${lunar.month}월 ${lunar.day}일${leapMark}`;
    }

    function formatSolarTermDate(term) {
      return `${term.name} · ${term.year}년 ${term.month}월 ${term.day}일`;
    }

    /* ------------------------------------------------------------------ */
    /* Moon SVG                                                             */
    /* ------------------------------------------------------------------ */

    function moonSVG(inner) {
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="88" height="88">${inner}</svg>`;
    }

    function getMoonSVG(lunarDay) {
      const R = 38, cx = 50, cy = 50;
      const moonColor = '#e8d5b7';
      const darkColor = '#12121e';
      const stroke = 'rgba(232,213,183,0.25)';
      const darkCircle = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${darkColor}" stroke="${stroke}" stroke-width="1.5"/>`;
      const clip = `<defs><clipPath id="mc"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath></defs>`;

      if (lunarDay === 1)  return moonSVG(darkCircle);
      if (lunarDay === 15) return moonSVG(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${moonColor}"/>`);

      const isWaxing = lunarDay < 15;
      const t = isWaxing ? (lunarDay - 1) / 14 : (lunarDay - 15) / 14;
      const tx = R * Math.cos(t * Math.PI);
      const atx = Math.abs(tx);

      let path;
      if (isWaxing) {
        if (atx < 0.5) {
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} L ${cx} ${cy - R} Z`;
        } else {
          const sweep = tx >= 0 ? 0 : 1;
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} A ${atx} ${R} 0 0 ${sweep} ${cx} ${cy - R} Z`;
        }
      } else {
        if (atx < 0.5) {
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} L ${cx} ${cy - R} Z`;
        } else {
          const sweep = tx >= 0 ? 1 : 0;
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} A ${atx} ${R} 0 0 ${sweep} ${cx} ${cy - R} Z`;
        }
      }

      return moonSVG(`${clip}${darkCircle}<path d="${path}" fill="${moonColor}" clip-path="url(#mc)"/>`);
    }

    /* ------------------------------------------------------------------ */
    /* Solar Term Wheel SVG                                                 */
    /* ------------------------------------------------------------------ */

    function getSolarTermWheelSVG(currentTermName, nextTermName, progress = 0) {
      const cx = 80, cy = 80, R = 60, innerR = 28;

      function polar(deg, r) {
        const rad = deg * Math.PI / 180;
        return [cx + r * Math.sin(rad), cy - r * Math.cos(rad)];
      }

      const f = (n) => n.toFixed(2);
      const parts = [];

      /* 계절별 링 호(arc) — startIdx × 15° 부터 90° */
      const seasonDefs = [
        { startIdx: 3,  label: '봄',  color: 'rgba(138,181,160,0.42)',  labelColor: 'rgba(138,181,160,0.85)'  },
        { startIdx: 9,  label: '여름', color: 'rgba(201,169,110,0.38)', labelColor: 'rgba(201,169,110,0.85)' },
        { startIdx: 15, label: '가을', color: 'rgba(196,139,90,0.42)',  labelColor: 'rgba(196,139,90,0.85)'  },
        { startIdx: 21, label: '겨울', color: 'rgba(122,158,201,0.42)', labelColor: 'rgba(122,158,201,0.85)' },
      ];

      for (const s of seasonDefs) {
        const a1 = s.startIdx * 15;
        const a2 = (s.startIdx + 6) * 15;
        const [ox1, oy1] = polar(a1, R);
        const [ox2, oy2] = polar(a2, R);
        const [ix1, iy1] = polar(a1, innerR);
        const [ix2, iy2] = polar(a2, innerR);
        parts.push(
          `<path d="M ${f(ox1)} ${f(oy1)} A ${R} ${R} 0 0 1 ${f(ox2)} ${f(oy2)} ` +
          `L ${f(ix2)} ${f(iy2)} A ${innerR} ${innerR} 0 0 0 ${f(ix1)} ${f(iy1)} Z" fill="${s.color}"/>`
        );
        const midAngle = (s.startIdx + 3) * 15;
        const midR = (R + innerR) / 2;
        const [lx, ly] = polar(midAngle, midR);
        parts.push(
          `<text x="${f(lx)}" y="${(ly + 3.5).toFixed(2)}" text-anchor="middle" ` +
          `font-family="'Noto Serif KR',Georgia,serif" font-size="10" font-weight="300" ` +
          `fill="${s.labelColor}">${s.label}</text>`
        );
      }

      /* 외곽·내부 원 */
      parts.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(240,230,211,0.22)" stroke-width="0.8"/>`);
      parts.push(`<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="none" stroke="rgba(240,230,211,0.13)" stroke-width="0.7"/>`);

      /* 24개 절기 점 — 모두 동일한 흰 점 */
      const currentIdx  = WHEEL_ORDER.indexOf(currentTermName);
      const markerAngle = currentIdx * 15 + progress * 15;

      for (let i = 0; i < 24; i++) {
        const [x, y] = polar(i * 15, R);
        parts.push(`<circle cx="${f(x)}" cy="${f(y)}" r="2.2" fill="rgba(240,230,211,0.48)"/>`);
      }

      /* 진행 호 — currentAngle → markerAngle */
      if (currentIdx >= 0 && progress > 0.01) {
        const arcR = R + 2;
        const [ax1, ay1] = polar(currentIdx * 15, arcR);
        const [ax2, ay2] = polar(markerAngle, arcR);
        parts.push(
          `<path d="M ${f(ax1)} ${f(ay1)} A ${arcR} ${arcR} 0 0 1 ${f(ax2)} ${f(ay2)}" ` +
          `fill="none" stroke="rgba(201,169,110,0.65)" stroke-width="2" stroke-linecap="round"/>`
        );
      }

      /* 비례 마커 (금색 채움 + 후광) */
      if (currentIdx >= 0) {
        const [mx, my] = polar(markerAngle, R);
        parts.push(`<circle cx="${f(mx)}" cy="${f(my)}" r="8" fill="none" stroke="rgba(201,169,110,0.35)" stroke-width="1"/>`);
        parts.push(`<circle cx="${f(mx)}" cy="${f(my)}" r="4.5" fill="#c9a96e"/>`);

        /* 마커 → 중심 방사선 */
        const [ox, oy] = polar(markerAngle, R - 10);
        const [ix, iy] = polar(markerAngle, innerR + 4);
        parts.push(`<line x1="${f(ox)}" y1="${f(oy)}" x2="${f(ix)}" y2="${f(iy)}" stroke="rgba(201,169,110,0.6)" stroke-width="0.9"/>`);
      }

      /* 중앙 계절 한 글자 */
      const season = getSeason(currentTermName);
      if (season) {
        parts.push(
          `<text x="${cx}" y="${cy + 6}" text-anchor="middle" ` +
          `font-family="'Noto Serif KR',Georgia,serif" font-size="17" font-weight="300" ` +
          `fill="${season.color}" letter-spacing="0.05em">${season.label}</text>`
        );
      }

      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="200" height="200">${parts.join('')}</svg>`;
    }

    /* ------------------------------------------------------------------ */
    /* UI                                                                   */
    /* ------------------------------------------------------------------ */

    const birthdateInput  = document.getElementById('birthdate');
    birthdateInput.value  = new Date().toISOString().slice(0, 10);
    const convertBtn      = document.getElementById('convertBtn');
    const resetBtn        = document.getElementById('resetBtn');
    const errorMsg        = document.getElementById('errorMsg');
    const inputScreen     = document.getElementById('input-screen');
    const resultScreen    = document.getElementById('result-screen');
    const resultMain      = document.getElementById('resultMain');
    const resultMeta      = document.getElementById('resultMeta');
    const moonIcon        = document.getElementById('moonIcon');
    const wheelEl         = document.getElementById('solar-term-wheel');
    const seasonEl        = document.getElementById('result-season');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    function showResult(year, month, day, lunar, term, nextTerm) {
      const moonWording = getMoonPhaseWording(lunar.day);
      const termWording = SOLAR_TERM_WORDING[term.name];
      const season      = getSeason(term.name);

      inputScreen.classList.add('screen--exit');

      setTimeout(() => {
        moonIcon.innerHTML   = getMoonSVG(lunar.day);
        resultMain.innerHTML = `${termWording},<br>${moonWording}`;
        resultMeta.innerHTML = `
          <span class="meta-item">${formatSolarDate(year, month, day)}</span>
          <span class="meta-item">${formatLunarDate(lunar)}</span>
        `;

        const birthday = new Date(year, month - 1, day);
        const progress = nextTerm
          ? (birthday - term.date) / (nextTerm.date - term.date)
          : 0;
        wheelEl.innerHTML = getSolarTermWheelSVG(term.name, nextTerm?.name, progress);

        if (season && nextTerm) {
          seasonEl.textContent = `${season.label} · ${term.name}${josa(term.name)} ${nextTerm.name} 사이`;
        } else if (season) {
          seasonEl.textContent = season.label;
        } else {
          seasonEl.textContent = '';
        }

        resultScreen.classList.remove('screen--hidden');
        resultScreen.classList.add('screen--entering');
      }, 380);
    }

    function reset() {
      resultScreen.classList.add('screen--hidden');
      resultScreen.classList.remove('screen--entering');
      setTimeout(() => {
        clearError();
        inputScreen.classList.remove('screen--exit');
      }, 480);
    }

    function convert() {
      clearError();

      const value = birthdateInput.value;
      if (!value) {
        showError('날짜를 입력해주세요.');
        return;
      }

      const [year, month, day] = value.split('-').map(Number);

      if (year < 1900 || (year === 2050 && month > 11) || year > 2050) {
        showError('1900년 ~ 2050년 사이의 날짜를 입력해주세요.');
        return;
      }

      let lunar;
      try {
        lunar = getLunarDate(year, month, day);
        if (!lunar || !lunar.day) throw new Error('변환 실패');
      } catch (e) {
        showError('음력 변환에 실패했습니다. 날짜를 확인해주세요.');
        return;
      }

      const term = getLastSolarTerm(year, month, day);
      if (!term) {
        showError('절기 정보를 불러오지 못했습니다.');
        return;
      }

      const nextTerm = getNextSolarTerm(year, month, day);
      showResult(year, month, day, lunar, term, nextTerm);
    }

    convertBtn.addEventListener('click', convert);
    resetBtn.addEventListener('click', reset);
    birthdateInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') convert();
    });
  </script>
</body>
</html>

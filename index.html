<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음력 생일</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --text-primary: #f0e6d3;
      --text-secondary: #b1a08f;
      --accent: #c9a96e;
      --input-bg: #16161f;
      --border: #2a2a3a;
      --error: #c97a6e;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Noto Serif KR', 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    /* Input section */
    .input-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .input-label {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text-secondary);
    }

    .date-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: 'Noto Serif KR', 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: 300;
      padding: 0.85rem 1.25rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s ease;
      cursor: pointer;
    }

    .date-input:focus {
      border-color: var(--accent);
    }

    .date-input::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(0.3) saturate(0.8);
      cursor: pointer;
    }

    .convert-btn {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--accent);
      font-family: 'Noto Serif KR', 'Georgia', serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      padding: 0.7rem 2.5rem;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      outline: none;
    }

    .convert-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .convert-btn:active {
      opacity: 0.8;
    }

    /* Result section */
    .result-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .result-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    .moon-icon {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .moon-icon svg {
      filter: drop-shadow(0 0 14px rgba(201, 169, 110, 0.25));
    }

    .result-main {
      font-size: 1.65rem;
      font-weight: 300;
      line-height: 1.6;
      text-align: center;
      color: var(--text-primary);
      word-break: keep-all;
      letter-spacing: -0.01em;
    }

    .result-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
    }

    .meta-item {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Error */
    .error-msg {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--error);
      text-align: center;
      letter-spacing: 0.05em;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    @media (max-width: 400px) {
      .result-main {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>절기와 달의 모양으로 보는</h1>
      <h1>내 생일은?</h1>
    </header>

    <section class="input-section">
      <label class="input-label" for="birthdate">언제 태어났나요? 양력으로 입력해주세요.</label>
      <input
        id="birthdate"
        class="date-input"
        type="date"
        min="1900-01-31"
        max="2050-11-18"
      />
      <button class="convert-btn" id="convertBtn">확인</button>
      <p class="error-msg" id="errorMsg"></p>
    </section>

    <section class="result-section" id="resultSection">
      <div class="divider"></div>
      <div class="moon-icon" id="moonIcon"></div>
      <p class="result-main" id="resultMain"></p>
      <div class="result-meta" id="resultMeta"></div>
    </section>
  </div>

  <script src="https://unpkg.com/korean-lunar-calendar@0.3.6/dist/korean-lunar-calendar.min.js"></script>
  <script>
    /* ------------------------------------------------------------------ */
    /* Data                                                                 */
    /* ------------------------------------------------------------------ */

    const SOLAR_TERMS = [
      { name: '소한', month: 1,  baseDay: 6  },
      { name: '대한', month: 1,  baseDay: 20 },
      { name: '입춘', month: 2,  baseDay: 4  },
      { name: '우수', month: 2,  baseDay: 19 },
      { name: '경칩', month: 3,  baseDay: 6  },
      { name: '춘분', month: 3,  baseDay: 21 },
      { name: '청명', month: 4,  baseDay: 5  },
      { name: '곡우', month: 4,  baseDay: 20 },
      { name: '입하', month: 5,  baseDay: 6  },
      { name: '소만', month: 5,  baseDay: 21 },
      { name: '망종', month: 6,  baseDay: 6  },
      { name: '하지', month: 6,  baseDay: 21 },
      { name: '소서', month: 7,  baseDay: 7  },
      { name: '대서', month: 7,  baseDay: 23 },
      { name: '입추', month: 8,  baseDay: 7  },
      { name: '처서', month: 8,  baseDay: 23 },
      { name: '백로', month: 9,  baseDay: 8  },
      { name: '추분', month: 9,  baseDay: 23 },
      { name: '한로', month: 10, baseDay: 8  },
      { name: '상강', month: 10, baseDay: 23 },
      { name: '입동', month: 11, baseDay: 7  },
      { name: '소설', month: 11, baseDay: 22 },
      { name: '대설', month: 12, baseDay: 7  },
      { name: '동지', month: 12, baseDay: 22 },
    ];

    const SOLAR_TERM_WORDING = {
      '소한': '겨울 추위가 깊어지는 소한',
      '대한': '한 해의 가장 추운 날, 대한',
      '입춘': '봄이 시작되는 입춘',
      '우수': '눈이 녹아 비가 내리는 우수',
      '경칩': '땅속 벌레가 깨어나는 경칩',
      '춘분': '낮과 밤이 같아지는 춘분',
      '청명': '하늘이 맑고 밝아지는 청명',
      '곡우': '봄비가 내려 씨앗을 적시는 곡우',
      '입하': '여름이 시작되는 입하',
      '소만': '만물이 가득 차오르는 소만',
      '망종': '씨앗을 뿌리는 망종',
      '하지': '낮이 가장 긴 하지',
      '소서': '여름 더위가 시작되는 소서',
      '대서': '한 해의 가장 더운 날, 대서',
      '입추': '가을이 시작되는 입추',
      '처서': '더위가 물러가는 처서',
      '백로': '이슬이 맺히기 시작하는 백로',
      '추분': '낮과 밤이 같아지는 추분',
      '한로': '찬 이슬이 내리는 한로',
      '상강': '서리가 내리기 시작하는 상강',
      '입동': '겨울이 시작되는 입동',
      '소설': '첫눈이 내리는 소설',
      '대설': '눈이 가장 많이 내리는 대설',
      '동지': '밤이 가장 긴 동지',
    };

    /* ------------------------------------------------------------------ */
    /* Logic                                                                */
    /* ------------------------------------------------------------------ */

    function getMoonPhaseWording(lunarDay) {
      if (lunarDay === 1)  return '달이 숨은 날';
      if (lunarDay <= 6)   return '달이 막 피어나던 날';
      if (lunarDay <= 8)   return '달이 반쯤 찬 날';
      if (lunarDay <= 14)  return '달이 막 차오르던 날';
      if (lunarDay === 15) return '보름달이 뜬 날';
      if (lunarDay <= 21)  return '달이 기울기 시작한 날';
      if (lunarDay <= 23)  return '달이 반쯤 기운 날';
      return '달이 저물던 날';
    }

    function getLastSolarTerm(year, month, day) {
      const inputDate = new Date(year, month - 1, day);
      const candidates = [];

      // 전년도 + 당해년도 절기 모두 포함 (연초 엣지케이스 처리)
      for (const y of [year - 1, year]) {
        for (const term of SOLAR_TERMS) {
          candidates.push({
            name: term.name,
            date: new Date(y, term.month - 1, term.baseDay),
            year: y,
            month: term.month,
            day: term.baseDay,
          });
        }
      }

      // 입력 날짜 이전(또는 당일)의 절기 중 가장 최근
      candidates.sort((a, b) => b.date - a.date);
      return candidates.find(c => c.date <= inputDate) || null;
    }

    function getLunarDate(year, month, day) {
      const cal = new KoreanLunarCalendar();
      cal.setSolarDate(year, month, day);
      return cal.getLunarCalendar();
    }

    function formatLunarDate(lunar) {
      const leapMark = lunar.isLeapMonth ? ' (윤달)' : '';
      return `음력 ${lunar.year}년 ${lunar.month}월 ${lunar.day}일${leapMark}`;
    }

    function formatSolarTermDate(term) {
      return `${term.name} · ${term.year}년 ${term.month}월 ${term.day}일`;
    }

    /* ------------------------------------------------------------------ */
    /* Moon SVG                                                             */
    /* ------------------------------------------------------------------ */

    function moonSVG(inner) {
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="88" height="88">${inner}</svg>`;
    }

    function getMoonSVG(lunarDay) {
      const R = 38, cx = 50, cy = 50;
      const moonColor = '#e8d5b7';
      const darkColor = '#12121e';
      const stroke = 'rgba(232,213,183,0.25)';
      const darkCircle = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${darkColor}" stroke="${stroke}" stroke-width="1.5"/>`;
      const clip = `<defs><clipPath id="mc"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath></defs>`;

      // 삭 (New Moon)
      if (lunarDay === 1) return moonSVG(darkCircle);

      // 보름달 (Full Moon)
      if (lunarDay === 15) return moonSVG(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${moonColor}"/>`);

      const isWaxing = lunarDay < 15;
      const t = isWaxing ? (lunarDay - 1) / 14 : (lunarDay - 15) / 14;
      const tx = R * Math.cos(t * Math.PI);
      const atx = Math.abs(tx);

      let path;
      if (isWaxing) {
        // 오른쪽 반원 + terminator
        if (atx < 0.5) {
          // 상현 (tx≈0): 직선으로 처리
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} L ${cx} ${cy - R} Z`;
        } else {
          const sweep = tx >= 0 ? 0 : 1;
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} A ${atx} ${R} 0 0 ${sweep} ${cx} ${cy - R} Z`;
        }
      } else {
        // 왼쪽 반원 + terminator
        if (atx < 0.5) {
          // 하현 (tx≈0): 직선으로 처리
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} L ${cx} ${cy - R} Z`;
        } else {
          const sweep = tx >= 0 ? 1 : 0;
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} A ${atx} ${R} 0 0 ${sweep} ${cx} ${cy - R} Z`;
        }
      }

      return moonSVG(`${clip}${darkCircle}<path d="${path}" fill="${moonColor}" clip-path="url(#mc)"/>`);
    }

    /* ------------------------------------------------------------------ */
    /* UI                                                                   */
    /* ------------------------------------------------------------------ */

    const birthdateInput = document.getElementById('birthdate');
    const convertBtn     = document.getElementById('convertBtn');
    const errorMsg       = document.getElementById('errorMsg');
    const resultSection  = document.getElementById('resultSection');
    const resultMain     = document.getElementById('resultMain');
    const resultMeta     = document.getElementById('resultMeta');
    const moonIcon       = document.getElementById('moonIcon');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      resultSection.classList.remove('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    function convert() {
      clearError();

      const value = birthdateInput.value;
      if (!value) {
        showError('날짜를 입력해주세요.');
        return;
      }

      const [year, month, day] = value.split('-').map(Number);

      // 지원 범위 체크
      if (year < 1900 || (year === 2050 && month > 11) || year > 2050) {
        showError('1900년 ~ 2050년 사이의 날짜를 입력해주세요.');
        return;
      }

      let lunar;
      try {
        lunar = getLunarDate(year, month, day);
        if (!lunar || !lunar.day) throw new Error('변환 실패');
      } catch (e) {
        showError('음력 변환에 실패했습니다. 날짜를 확인해주세요.');
        return;
      }

      const term = getLastSolarTerm(year, month, day);
      if (!term) {
        showError('절기 정보를 불러오지 못했습니다.');
        return;
      }

      const moonWording = getMoonPhaseWording(lunar.day);
      const termWording = SOLAR_TERM_WORDING[term.name];

      moonIcon.innerHTML = getMoonSVG(lunar.day);
      resultMain.innerHTML = `${termWording},<br>${moonWording}`;

      resultMeta.innerHTML = `
        <span class="meta-item">${formatLunarDate(lunar)}</span>
        <span class="meta-item">${formatSolarTermDate(term)}</span>
      `;

      // 결과 표시 (애니메이션)
      resultSection.classList.remove('visible');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          resultSection.classList.add('visible');
        });
      });
    }

    convertBtn.addEventListener('click', convert);
    birthdateInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') convert();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>달과 절기로 보는 내 생일</title>
  <meta property="og:title" content="달과 절기로 보는 내 생일" />
  <meta property="og:description" content="옛날 사람들은 생일을 어떻게 알 수 있었을까요? 태어난 날의 절기와 달의 모양을 알아보세요" />
  <meta name="twitter:title" content="달과 절기로 보는 내 생일" />
  <meta name="twitter:description" content="옛날 사람들은 생일을 어떻게 알 수 있었을까요? 태어난 날의 절기와 달의 모양을 알아보세요" />
  <meta name="twitter:image" content="이미지 URL" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #06060e;
      --text-primary: #f0e6d3;
      --text-secondary: #c4ad93;
      --accent: #c9a96e;
      --error: #c97a6e;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Noto Serif KR', Georgia, serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased; /* iOS/macOS */
      overscroll-behavior: none;           /* Android pull-to-refresh 방지 */
    }

    /* Atmospheric glow — top */
    body::before {
      content: '';
      position: fixed;
      top: -10vh;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 55vh;
      background: radial-gradient(ellipse, rgba(201,169,110,0.055) 0%, transparent 72%);
      pointer-events: none;
      z-index: 0;
    }

    /* ────────────────────────────────────────
       SCREEN BASE
    ──────────────────────────────────────── */

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Safe area: 노치/홈 바 영역 확보 */
      padding:
        max(3rem, env(safe-area-inset-top))
        max(2rem, env(safe-area-inset-right))
        max(3rem, env(safe-area-inset-bottom))
        max(2rem, env(safe-area-inset-left));
      /* 가로 모드 등 콘텐츠 넘침 대비 */
      overflow-y: auto;
      z-index: 1;
      transition:
        opacity  0.6s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .screen--exit {
      opacity: 0 !important;
      transform: translateY(-30px) !important;
      pointer-events: none !important;
    }

    .screen--hidden {
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
    }

    /* ────────────────────────────────────────
       INPUT SCREEN
    ──────────────────────────────────────── */

    /* Faint orbital rings — subliminal moon motif */
    #input-screen::before,
    #input-screen::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.055);
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
    #input-screen::before {
      width: min(340px, 80vw);
      height: min(340px, 80vw);
    }
    #input-screen::after {
      width: min(520px, 120vw);
      height: min(520px, 120vw);
      border-color: rgba(201,169,110,0.025);
    }

    .input-eyebrow {
      font-size: 0.9rem;
      font-weight: 200;
      letter-spacing: 0.3em;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 1.6rem;
      animation: fadeUp 0.8s 0.15s both;
    }

    .input-question {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.45;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.8s 0.3s both;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      animation: fadeUp 0.8s 0.45s both;
    }

    .date-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(240,230,211,0.16);
      color: var(--text-primary);
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 1.65rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      padding: 0.6rem 0.4rem;
      text-align: center;
      width: min(280px, 80vw);
      outline: none;
      cursor: pointer;
      transition: border-color 0.35s ease;
    }

    .date-input:focus {
      border-bottom-color: var(--accent);
    }

    /* iOS Safari: datetime 내부 파트 색상 명시 (기기 언어 무관하게 적용) */
    .date-input::-webkit-datetime-edit            { color: var(--text-primary); }
    .date-input::-webkit-datetime-edit-fields-wrapper { color: var(--text-primary); }
    .date-input::-webkit-datetime-edit-year-field  { color: var(--text-primary); }
    .date-input::-webkit-datetime-edit-month-field { color: var(--text-primary); }
    .date-input::-webkit-datetime-edit-day-field   { color: var(--text-primary); }
    .date-input::-webkit-datetime-edit-text        { color: var(--text-secondary); opacity: 0.5; }

    .date-input::-webkit-calendar-picker-indicator {
      filter: invert(0.5) sepia(0.4) saturate(0.6);
      cursor: pointer;
      opacity: 0.65;
    }

    .input-hint {
      font-size: 0.8rem;
      font-weight: 200;
      letter-spacing: 0.18em;
      color: var(--text-secondary);
    }

    /* CTA button with expanding lines */
    .cta-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.38em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: letter-spacing 0.35s ease, opacity 0.2s ease;
      animation: fadeUp 0.8s 0.6s both;
      /* 터치 타겟 최소 44px (Apple HIG 권고) */
      min-height: 44px;
      padding: 0.75rem 0.5rem;
    }

    .cta-btn::before,
    .cta-btn::after {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: currentColor;
      opacity: 0.55;
      transition: width 0.35s ease;
      flex-shrink: 0;
    }

    .cta-btn:hover {
      letter-spacing: 0.5em;
    }

    .cta-btn:hover::before,
    .cta-btn:hover::after {
      width: 30px;
    }

    .cta-btn:active {
      opacity: 0.7;
    }

    .error-msg {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--error);
      letter-spacing: 0.06em;
      text-align: center;
      margin-top: 1.8rem;
      min-height: 1.1em;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .error-msg.visible {
      opacity: 1;
    }

    /* ────────────────────────────────────────
       RESULT SCREEN
    ──────────────────────────────────────── */

    .moon-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 2.2rem;
    }

    .moon-icon svg {
      filter: drop-shadow(0 0 22px rgba(201,169,110,0.3));
    }

    .result-main {
      font-size: clamp(1.5rem, 6vw, 2.4rem);
      font-weight: 300;
      line-height: 1.75;
      text-align: center;
      color: var(--text-primary);
      word-break: keep-all;
      letter-spacing: -0.01em;
      margin-bottom: 2.2rem;
    }

    .result-rule {
      width: 28px;
      height: 1px;
      background: rgba(240,230,211,0.14);
      margin: 0 auto 2rem;
    }

    .result-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 3.5rem;
    }

    .meta-item {
      font-size: 0.9rem;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      text-align: center;
    }


    /* Staggered result reveal */
    .screen--entering .moon-icon   { animation: fadeUp 0.7s 0.1s  both; }
    .screen--entering .result-main { animation: fadeUp 0.7s 0.28s both; }
    .screen--entering .result-rule { animation: fadeUp 0.7s 0.45s both; }
    .screen--entering .result-meta { animation: fadeUp 0.7s 0.55s both; }
    .screen--entering .reset-btn   { animation: fadeUp 0.7s 0.72s both; }

    /* ────────────────────────────────────────
       ANIMATIONS
    ──────────────────────────────────────── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 가로 모드 / 낮은 화면 대응 */
    @media (max-height: 600px) {
      .input-question  { margin-bottom: 1.5rem; }
      .input-wrap      { margin-bottom: 1.5rem; }
      .moon-icon       { margin-bottom: 1.2rem; }
      .result-main     { margin-bottom: 1.2rem; font-size: clamp(1.2rem, 4vw, 1.6rem); }
      .result-rule     { margin-bottom: 1rem; }
      .result-meta     { margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <!-- ── INPUT SCREEN ───────────────────────── -->
  <div id="input-screen" class="screen">
    <p class="input-eyebrow" style="margin-bottom: 0.25rem">달력이 없던 시절을 상상하며</p>
    <p class="input-eyebrow">절기와 달의 모양으로 알아보는 나의 생일</p>

    <h1 class="input-question" style="margin-bottom: 0.75em">언제 태어났나요?</h1>

    <div class="input-wrap">
      <input
        id="birthdate"
        class="date-input"
        type="date"
        min="1900-01-31"
        max="2050-11-18"
      />
      <p class="input-hint">양력으로 입력해주세요</p>
    </div>

    <button class="cta-btn" id="convertBtn">알아보기</button>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <!-- ── RESULT SCREEN ──────────────────────── -->
  <div id="result-screen" class="screen screen--hidden">
    <div id="moonIcon" class="moon-icon"></div>
    <p id="resultMain" class="result-main"></p>
    <div class="result-rule"></div>
    <div id="resultMeta" class="result-meta"></div>
    <button id="resetBtn" class="reset-btn cta-btn">돌아가기</button>
  </div>

  <script src="https://unpkg.com/korean-lunar-calendar@0.3.6/dist/korean-lunar-calendar.min.js"></script>
  <script>
    /* ------------------------------------------------------------------ */
    /* Data                                                                 */
    /* ------------------------------------------------------------------ */

    const SOLAR_TERMS = [
      { name: '소한', month: 1,  baseDay: 6  },
      { name: '대한', month: 1,  baseDay: 20 },
      { name: '입춘', month: 2,  baseDay: 4  },
      { name: '우수', month: 2,  baseDay: 19 },
      { name: '경칩', month: 3,  baseDay: 6  },
      { name: '춘분', month: 3,  baseDay: 21 },
      { name: '청명', month: 4,  baseDay: 5  },
      { name: '곡우', month: 4,  baseDay: 20 },
      { name: '입하', month: 5,  baseDay: 6  },
      { name: '소만', month: 5,  baseDay: 21 },
      { name: '망종', month: 6,  baseDay: 6  },
      { name: '하지', month: 6,  baseDay: 21 },
      { name: '소서', month: 7,  baseDay: 7  },
      { name: '대서', month: 7,  baseDay: 23 },
      { name: '입추', month: 8,  baseDay: 7  },
      { name: '처서', month: 8,  baseDay: 23 },
      { name: '백로', month: 9,  baseDay: 8  },
      { name: '추분', month: 9,  baseDay: 23 },
      { name: '한로', month: 10, baseDay: 8  },
      { name: '상강', month: 10, baseDay: 23 },
      { name: '입동', month: 11, baseDay: 7  },
      { name: '소설', month: 11, baseDay: 22 },
      { name: '대설', month: 12, baseDay: 7  },
      { name: '동지', month: 12, baseDay: 22 },
    ];

    const SOLAR_TERM_WORDING = {
      '소한': '겨울 추위가 깊어지는 소한',
      '대한': '한 해의 가장 추운 날, 대한',
      '입춘': '봄이 시작되는 입춘',
      '우수': '눈이 녹아 비가 내리는 우수',
      '경칩': '땅속 벌레가 깨어나는 경칩',
      '춘분': '낮과 밤이 같아지는 춘분',
      '청명': '하늘이 맑고 밝아지는 청명',
      '곡우': '봄비가 내려 씨앗을 적시는 곡우',
      '입하': '여름이 시작되는 입하',
      '소만': '만물이 가득 차오르는 소만',
      '망종': '씨앗을 뿌리는 망종',
      '하지': '낮이 가장 긴 하지',
      '소서': '여름 더위가 시작되는 소서',
      '대서': '한 해의 가장 더운 날, 대서',
      '입추': '가을이 시작되는 입추',
      '처서': '더위가 물러가는 처서',
      '백로': '이슬이 맺히기 시작하는 백로',
      '추분': '낮과 밤이 같아지는 추분',
      '한로': '찬 이슬이 내리는 한로',
      '상강': '서리가 내리기 시작하는 상강',
      '입동': '겨울이 시작되는 입동',
      '소설': '첫눈이 내리는 소설',
      '대설': '눈이 가장 많이 내리는 대설',
      '동지': '밤이 가장 긴 동지',
    };

    /* ------------------------------------------------------------------ */
    /* Logic                                                                */
    /* ------------------------------------------------------------------ */

    function getMoonPhaseWording(lunarDay) {
      if (lunarDay === 1)  return '달이 숨은 날';
      if (lunarDay <= 6)   return '달이 막 피어나던 날';
      if (lunarDay <= 8)   return '달이 반쯤 찬 날';
      if (lunarDay <= 14)  return '달이 막 차오르던 날';
      if (lunarDay === 15) return '보름달이 뜬 날';
      if (lunarDay <= 21)  return '달이 기울기 시작한 날';
      if (lunarDay <= 23)  return '달이 반쯤 기운 날';
      return '달이 저물던 날';
    }

    function getLastSolarTerm(year, month, day) {
      const inputDate = new Date(year, month - 1, day);
      const candidates = [];
      for (const y of [year - 1, year]) {
        for (const term of SOLAR_TERMS) {
          candidates.push({
            name: term.name,
            date: new Date(y, term.month - 1, term.baseDay),
            year: y,
            month: term.month,
            day: term.baseDay,
          });
        }
      }
      candidates.sort((a, b) => b.date - a.date);
      return candidates.find(c => c.date <= inputDate) || null;
    }

    function getLunarDate(year, month, day) {
      const cal = new KoreanLunarCalendar();
      cal.setSolarDate(year, month, day);
      return cal.getLunarCalendar();
    }

    function formatLunarDate(lunar) {
      const leapMark = lunar.isLeapMonth ? ' (윤달)' : '';
      return `음력 · ${lunar.year}년 ${lunar.month}월 ${lunar.day}일${leapMark}`;
    }

    function formatSolarTermDate(term) {
      return `${term.name} · ${term.year}년 ${term.month}월 ${term.day}일`;
    }

    /* ------------------------------------------------------------------ */
    /* Moon SVG                                                             */
    /* ------------------------------------------------------------------ */

    function moonSVG(inner) {
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="88" height="88">${inner}</svg>`;
    }

    function getMoonSVG(lunarDay) {
      const R = 38, cx = 50, cy = 50;
      const moonColor = '#e8d5b7';
      const darkColor = '#12121e';
      const stroke = 'rgba(232,213,183,0.25)';
      const darkCircle = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${darkColor}" stroke="${stroke}" stroke-width="1.5"/>`;
      const clip = `<defs><clipPath id="mc"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath></defs>`;

      if (lunarDay === 1)  return moonSVG(darkCircle);
      if (lunarDay === 15) return moonSVG(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${moonColor}"/>`);

      const isWaxing = lunarDay < 15;
      const t = isWaxing ? (lunarDay - 1) / 14 : (lunarDay - 15) / 14;
      const tx = R * Math.cos(t * Math.PI);
      const atx = Math.abs(tx);

      let path;
      if (isWaxing) {
        if (atx < 0.5) {
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} L ${cx} ${cy - R} Z`;
        } else {
          const sweep = tx >= 0 ? 0 : 1;
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} A ${atx} ${R} 0 0 ${sweep} ${cx} ${cy - R} Z`;
        }
      } else {
        if (atx < 0.5) {
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} L ${cx} ${cy - R} Z`;
        } else {
          const sweep = tx >= 0 ? 1 : 0;
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} A ${atx} ${R} 0 0 ${sweep} ${cx} ${cy - R} Z`;
        }
      }

      return moonSVG(`${clip}${darkCircle}<path d="${path}" fill="${moonColor}" clip-path="url(#mc)"/>`);
    }

    /* ------------------------------------------------------------------ */
    /* UI                                                                   */
    /* ------------------------------------------------------------------ */

    const birthdateInput = document.getElementById('birthdate');
    // 오늘 날짜를 기본값으로 설정
    birthdateInput.value = new Date().toISOString().slice(0, 10);
    const convertBtn     = document.getElementById('convertBtn');
    const resetBtn       = document.getElementById('resetBtn');
    const errorMsg       = document.getElementById('errorMsg');
    const inputScreen    = document.getElementById('input-screen');
    const resultScreen   = document.getElementById('result-screen');
    const resultMain     = document.getElementById('resultMain');
    const resultMeta     = document.getElementById('resultMeta');
    const moonIcon       = document.getElementById('moonIcon');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    function showResult(lunar, term) {
      const moonWording = getMoonPhaseWording(lunar.day);
      const termWording = SOLAR_TERM_WORDING[term.name];

      // Exit input screen
      inputScreen.classList.add('screen--exit');

      // Populate and reveal result after exit animation starts
      setTimeout(() => {
        moonIcon.innerHTML = getMoonSVG(lunar.day);
        resultMain.innerHTML = `${termWording},<br>${moonWording}`;
        resultMeta.innerHTML = `
          <span class="meta-item">${formatLunarDate(lunar)}</span>
          <span class="meta-item">${formatSolarTermDate(term)}</span>
        `;
        resultScreen.classList.remove('screen--hidden');
        resultScreen.classList.add('screen--entering');
      }, 380);
    }

    function reset() {
      resultScreen.classList.add('screen--hidden');
      resultScreen.classList.remove('screen--entering');
      setTimeout(() => {
        clearError();
        inputScreen.classList.remove('screen--exit');
      }, 480);
    }

    function convert() {
      clearError();

      const value = birthdateInput.value;
      if (!value) {
        showError('날짜를 입력해주세요.');
        return;
      }

      const [year, month, day] = value.split('-').map(Number);

      if (year < 1900 || (year === 2050 && month > 11) || year > 2050) {
        showError('1900년 ~ 2050년 사이의 날짜를 입력해주세요.');
        return;
      }

      let lunar;
      try {
        lunar = getLunarDate(year, month, day);
        if (!lunar || !lunar.day) throw new Error('변환 실패');
      } catch (e) {
        showError('음력 변환에 실패했습니다. 날짜를 확인해주세요.');
        return;
      }

      const term = getLastSolarTerm(year, month, day);
      if (!term) {
        showError('절기 정보를 불러오지 못했습니다.');
        return;
      }

      showResult(lunar, term);
    }

    convertBtn.addEventListener('click', convert);
    resetBtn.addEventListener('click', reset);
    birthdateInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') convert();
    });
  </script>
</body>
</html>
